<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE // Synthwave Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="arcade-background">
    <div class="cyber-grid"></div>
    <div class="horizon-glow"></div>
</div>
    <!-- The outer dashboard links the Leaderboard and the Game Board together -->
    <div class="dashboard-wrapper">
        
        <!-- NEW: Left Sidebar Leaderboard -->
        <aside class="leaderboard-sidebar">
    <h2>TOP RANKS</h2>
    <p style="font-size: 9px; color: rgba(255,255,255,0.3); text-align: center; margin-bottom: 10px;">CLICK [X] TO ERASE DATA</p>
    <ul id="leaderboard-list">
        </ul>
</aside>

        <!-- Right Side: Main Game Area -->
        <main class="game-outer-wrapper">
            <header>
    <h1>SNAKE</h1>
    <div id="score-board">
        SCORE : <span id="score">0</span> 
        <span id="lives-board" style="margin-left: 20px; color: var(--neon-pink);"></span>
    </div>
</header>
            
            <div class="canvas-container">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
                
                <!-- UPDATED: Overlay now asks for a player name -->
                <div id="game-overlay">
                    <div class="input-group">
                        <input type="text" id="player-name" placeholder="Enter your Name" maxlength="10">
                        <button id="start-button">START GAME</button>
                    </div>
                </div>
            </div>
            
            <footer>
    <p>CONTROLS: Arrow Keys or [W A S D]</p>
</footer>
        </main>

    </div>
    <script src="script.js"></script>
    <div id="undo-toast" class="toast-hidden">
    <span>SCORE RECORD REMOVED</span>
    <button id="undo-button">UNDO</button>
</div>
</body>
</html>
